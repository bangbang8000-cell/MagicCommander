name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Embed Python runtime (Windows only)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $pythonUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          $targetDir = "resources\python"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Write-Host "下载嵌入式 Python 3.11.9..."
          Invoke-WebRequest -Uri $pythonUrl -OutFile "$env:TEMP\python-embed.zip" -UseBasicParsing
          Write-Host "解压..."
          Expand-Archive -Path "$env:TEMP\python-embed.zip" -DestinationPath $targetDir -Force
          Write-Host "配置 site-packages..."
          $pthFile = "$targetDir\python311._pth"
          (Get-Content $pthFile) -replace '#import site', 'import site' | Set-Content $pthFile -Encoding UTF8
          Add-Content -Path $pthFile -Value 'Lib\site-packages' -Encoding UTF8
          Write-Host "安装 pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$targetDir\get-pip.py" -UseBasicParsing
          & "$targetDir\python.exe" "$targetDir\get-pip.py" --no-warn-script-location
          Write-Host "安装 Python 依赖..."
          & "$targetDir\python.exe" -m pip install -r backend\requirements.txt --no-warn-script-location
          Remove-Item "$targetDir\get-pip.py" -Force -ErrorAction SilentlyContinue
          Write-Host "删除 ._pth 文件以启用标准 sys.path 初始化（使 PYTHONPATH 环境变量生效）..."
          Remove-Item "$pthFile" -Force
          Write-Host "验证..."
          & "$targetDir\python.exe" -c "import pandas; import jinja2; import openpyxl; import yaml; print('OK')"

      - name: Embed Python runtime (Linux)
        if: matrix.platform == 'linux'
        run: |
          PYTHON_TAG="20250708"
          PYTHON_VERSION="3.11.13"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PYTHON_TAG}/cpython-${PYTHON_VERSION}+${PYTHON_TAG}-x86_64-unknown-linux-gnu-install_only_stripped.tar.gz"
          echo "下载嵌入式 Python ${PYTHON_VERSION}..."
          curl -L -o /tmp/python-embed.tar.gz "${URL}"
          mkdir -p resources/python
          echo "解压..."
          tar -xzf /tmp/python-embed.tar.gz -C resources/python --strip-components=1
          chmod +x resources/python/bin/python3
          echo "安装 pip..."
          curl -L -o /tmp/get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./resources/python/bin/python3 /tmp/get-pip.py --no-warn-script-location
          echo "安装 Python 依赖..."
          ./resources/python/bin/python3 -m pip install -r backend/requirements.txt --no-warn-script-location
          echo "验证..."
          ./resources/python/bin/python3 -c "import pandas; import jinja2; import openpyxl; import yaml; print('OK')"

      - name: Embed Python runtime (macOS)
        if: matrix.platform == 'mac'
        run: |
          PYTHON_TAG="20250708"
          PYTHON_VERSION="3.11.13"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PYTHON_TAG}/cpython-${PYTHON_VERSION}+${PYTHON_TAG}-aarch64-apple-darwin-install_only_stripped.tar.gz"
          echo "下载嵌入式 Python ${PYTHON_VERSION}..."
          curl -L -o /tmp/python-embed.tar.gz "${URL}"
          mkdir -p resources/python
          echo "解压..."
          tar -xzf /tmp/python-embed.tar.gz -C resources/python --strip-components=1
          chmod +x resources/python/bin/python3
          echo "安装 pip..."
          curl -L -o /tmp/get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./resources/python/bin/python3 /tmp/get-pip.py --no-warn-script-location
          echo "安装 Python 依赖..."
          ./resources/python/bin/python3 -m pip install -r backend/requirements.txt --no-warn-script-location
          echo "验证..."
          ./resources/python/bin/python3 -c "import pandas; import jinja2; import openpyxl; import yaml; print('OK')"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MagicCommander-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          retention-days: 30

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 如果同名 release 已存在（之前失败构建残留），先删除
          gh release delete "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --yes || true
          # 删除跨平台同名冲突的 debug 文件（各平台 builder-debug.yml 文件名相同）
          find release -name "builder-debug.yml" -delete
          gh release create "${{ github.ref_name }}" \
            release/*/*.exe \
            release/*/*.zip \
            release/*/*.AppImage \
            release/*/*.deb \
            release/*/*.blockmap \
            release/*/*.yml \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes